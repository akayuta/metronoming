name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3 python3-pip \
            openjdk-17-jdk-headless \
            git wget unzip
      - name: Install Python dependencies
        run: |
          pip install buildozer cython
      - name: Build APK
        run: buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: metronoming-apk
          path: bin/metronoming-*.apk
